name = "ctg-cf-staging"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Local D1 database binding.
#
# For local staging (`make dev`), wrangler emulates this against a SQLite file
# under .wrangler/state — no remote database is required, and database_id can
# stay as the placeholder below.
#
# To deploy to a real remote D1 instance, run `make db-create`, then paste the
# returned id into database_id.
[[d1_databases]]
binding = "DB"
database_name = "ctg_cf_staging"
database_id = "local-placeholder-replace-for-remote"
